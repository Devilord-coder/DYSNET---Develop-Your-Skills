{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error_style.css') }}">
{% endblock %}

{% block content %}
    <div class="error-page">
        <div class="error-header">
            <div class="error-icon-status">
                <i class="{{ icon_class }}"></i>
                <span class="error-status">Ошибка {{ status_code }}</span>
            </div>
        </div>
        <div class="error-content">
            <div class="error-image">
                <img src="{{ url_for('static', filename='img/error_image.png') }}" alt="Ошибка" width="80">
            </div>
            <div class="error-text">
                <h2>{{ title }}</h2>
                <p>{{ message }}</p>
            </div>
        </div>

        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">Вернуться на главную</a>
            {% if status_code != 404 %}
                <button onclick="window.history.back()" class="btn btn-secondary">Назад</button>
            {% endif %}
        </div>
    </div>
{% endblock %}
