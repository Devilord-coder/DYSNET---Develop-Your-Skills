{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                {% if current_user.id == user %}
                    <button class="btn btn-outline-danger btn-edit position-absolute top-0 end-0 m-3"
                        onclick="location.href='/profile/edit'">
                        <i class="fas fa-edit me-1"></i> Изменить
                    </button>
                {% endif %}
                <div class="card-body text-center p-5">
                    <!-- Аватар пользователя -->
                    <div class="mb-4">
                        {% if user.avatar %}
                        <img src="{{ user.avatar.url }}" alt="Аватар пользователя"
                            class="rounded-circle img-fluid border border-3 border-primary"
                            style="width: 150px; height: 150px; object-fit: cover;">
                        {% else %}
                        <div class="mx-auto bg-primary rounded-circle d-flex align-items-center justify-content-center"
                            style="width: 150px; height: 150px;">
                            <i class="bi bi-person-fill" style="font-size: 80px; color: white;"></i>
                        </div>
                        {% endif %}
                    </div>

                    <!-- Имя пользователя -->
                    <h2 class="mb-1">
                        {{ user.name }} {{ user.surname }}
                    </h2>

                    <p class="text-muted mb-3">{{ user.email }}</p>
                    <p class="mb-3"> {{ user.aboutme }} </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
