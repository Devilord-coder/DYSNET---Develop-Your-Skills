{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <button class="btn btn-outline-danger btn-edit position-absolute top-0 end-0 m-3"
                    onclick="location.href='/profile/edit'">
                    <i class="fas fa-edit me-1"></i> Изменить
                </button>
                <div class="card-body text-center p-5">
                    <!-- Аватар пользователя -->
                    <div class="mb-4">
                        {% if avatar %} <img src="{{ url_for('uploaded_file', filename=avatar) }}"
                            class="rounded-circle img-fluid border border-3 border-primary"
                            style="width: 150px; height: 150px; object-fit: cover;">
                        {% else %}
                        <div class="mx-auto bg-primary rounded-circle d-flex align-items-center justify-content-center"
                            style="width: 150px; height: 150px;">
                            <i class="bi bi-person-fill" style="font-size: 80px; color: white;"></i>
                        </div>
                        {% endif %}
                    </div>

                    <!-- Имя пользователя -->
                    <h2 class="mb-1">
                        {{ user.name }} {{ user.surname }}
                    </h2>

                    <p class="text-muted mb-3">{{ user.email }}</p>
                    <p class="mb-3"> {{ user.aboutme }} </p>
                </div>
            </div>
            {% if user.email == current_user.email %}
            <div class="mt-4">
                <a href="/articles/add" class="btn btn-lg"
                    style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; border: 2px solid #3b82f6; border-radius: 25px; padding: 10px 30px; font-weight: 600;">
                    <i class="bi bi-plus-circle-fill me-2"></i>
                    Написать статью
                </a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
