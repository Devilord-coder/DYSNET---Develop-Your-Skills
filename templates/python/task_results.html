{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/python/task_result.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
<div class="top-bar mb-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="d-flex gap-3">
            <a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-house-door"></i> Главная
            </a>
            <a href="{{ url_for('python.choose_level') }}" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-house-door"></i> Вернуться к заданиям
            </a>
            <div class="d-flex gap-3">
                <a href="{{ url_for('python.statistics') }}" class="btn btn-outline-success btn-lg">
                    <i class="bi bi-graph-up"></i> Статистика
                </a>
            </div>
        </div>
    </div>
</div>
<div class="test-results-container">
    <div class="results-card">
        <div class="results-header">
            <h1><i class="fas fa-chart-line"></i> Результаты тестирования</h1>
            <p>Детальный отчёт о прохождении тестов</p>
        </div>

        <div class="stats" id="stats">
            <!-- Статистика будет заполнена через JS -->
        </div>

        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>№ теста</th>
                        <th>Статус</th>
                        <th>Время выполнения</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Данные будут заполнены через JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-bug"></i> Детали ошибки</h2>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body" id="modal-body">
            <!-- Содержимое будет вставлено сюда -->
        </div>
        <div class="modal-buttons">
            <button class="btn-modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i> Закрыть
            </button>
        </div>
    </div>
</div>
<script>
    const testResults = {{ data_json| safe }};
</script>
<script src="{{ url_for('static', filename='js/python/task_result.js') }}"></script>
{% endblock %}
