{% extends "base.html" %}

{% block content %}
<!-- Кнопка для добавления задания -->
{% if current_user.role == 'admin' %}
<div class="mt-4">
    <a href="/tasks/add" class="btn btn-lg"
        style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; border: 2px solid #3b82f6; border-radius: 25px; padding: 10px 30px; font-weight: 600;">
        <i class="bi bi-plus-circle-fill me-2"></i>Добавить задание
    </a>
</div>
{% endif %}
{% endblock %}
